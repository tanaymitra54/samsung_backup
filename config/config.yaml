model:
  name: "deepseek-ai/deepseek-coder-1.5b-instruct"
  cache_dir: "./cache/models"

pipeline:
  num_answers: 2
  num_reasons: 2
  subset_size: 6
  max_new_tokens: 96
  temperature_range: [0.3, 0.9]
  top_p: 0.95

verifier:
  math_mode: "calculator"  # calculator | symbolic
  nli_model: "cross-encoder/nli-distilroberta-base"
  nli_threshold: 0.5

qubo:
  max_vars: 200
  similarity_metric: "cosine"
  clustering_method: "kmeans"
  penalty_weight: 2.0
  diversity_bonus: 0.5

solver:
  method: "simulated_annealing"  # sa | tabu | quantum
  sa:
    initial_temp: 100.0
    final_temp: 0.01
    cooling_rate: 0.99
    iterations: 500
    num_reads: 2

training:
  sft_epochs: 3
  learning_rate: 2e-5
  batch_size: 4
  lora_rank: 16
  output_dir: "./checkpoints"

evaluation:
  benchmarks:
    - "gsm8k"
    - "bbh"
    - "strategyqa"
    - "arc_challenge"
    - "mmlu"
  subset_size: 200  # small subset for fast CPU testing
  full_eval: false
